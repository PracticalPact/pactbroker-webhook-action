name: "can-i-deploy-gateway"
description: "Checks can-i-deploy for a consumer and all its gateway chain participants"
inputs:
  brokerUrl:
    description: "Pact broker URL"
    required: true
  brokerToken:
    description: "Pact broker token"
    required: true
  applicationName:
    description: "Name of your application"
    required: true
  version:
    description: "Version (commit SHA) of your application"
    required: true
  toEnvironment:
    description: "Environment you want to deploy to"
    required: true
  retryWhileUnknown:
    description: "Number of times to retry while verification is unknown"
    required: false
    default: "0"
  retryInterval:
    description: "Seconds between retries"
    required: false
    default: "10"
runs:
  using: "node20"
  main: "index.js"